services:
  - type: web
    name: tinymola-agent
    env: node
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: JWT_SECRET
        value: tinymola-agent-prod-secret-2026
      - key: NODE_ENV
        value: production
